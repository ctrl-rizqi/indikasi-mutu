services:
  mysql:
    image: mysql:8.0
    container_name: indikator-mutu-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: indikator_mutu
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    command: --default-authentication-plugin=mysql_native_password --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootpassword" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - indikator-mutu-network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: indikator-mutu-backend
    environment:
      - DATABASE_URL=mysql://myuser:mypassword@mysql:3306/indikator_mutu
      - JWT_SECRET=your_jwt_secret_here
      - PORT=5000
    ports:
      - "5000:5000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - indikator-mutu-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      args:
        # URL ini harus bisa diakses oleh browser user (bukan hostname Docker internal).
        # Ganti dengan IP server atau domain jika deploy ke server:
        # contoh: VITE_API_URL=http://192.168.1.100:5000/api
        - VITE_API_URL=http://192.168.24.117:5000/api
    container_name: indikator-mutu-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - indikator-mutu-network

volumes:
  mysql_data:


networks:
  indikator-mutu-network:
    driver: bridge
